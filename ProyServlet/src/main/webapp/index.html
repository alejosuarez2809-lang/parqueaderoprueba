<!DOCTYPE html>
<html>
    <head>
        <title>Registro de vehículo</title>
         <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    
  <body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Registrar Nuevo Vehículo</h4>
                    </div>
                    
                    <div class="card-body p-4">
                        <form action="RegistroVehiculoServlet" method="POST">
                            
                            <div class="mb-3">
                                <label for="id" class="form-label fw-bold">ID Vehículo</label>
                                <input type="text" name="id" id="id" class="form-control" placeholder="Ej: 101" required>
                            </div>

                            <div class="mb-3">
                                <label for="placa" class="form-label fw-bold">Placa</label>
                                <input type="text" name="placa" id="placa" class="form-control" placeholder="ABC-123" required style="text-transform: uppercase;">
                            </div>

                            <div class="mb-3">
                                <label for="tipo" class="form-label fw-bold">Tipo de Vehículo</label>
                                <select name="tipo" id="tipo" class="form-select">
                                    <option value="Carro">Carro</option>
                                    <option value="Moto">Moto</option>
                                    <option value="Camioneta">Camioneta</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label for="propietario" class="form-label fw-bold">Nombre del Propietario</label>
                                <input type="text" name="propietario" id="propietario" class="form-control" placeholder="Nombre completo" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    Guardar Registro
                                </button>
                            </div>
                            
                        </form>
                    </div>
                </div>
                
                <p class="text-center mt-3 text-muted small">Sistema de Gestión Vehicular &copy; 2024</p>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
